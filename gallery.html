<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Gallery - Zehao Sha</title>
  <style>
    body { font-family: sans-serif; background-color: white; margin: 20px; }
    h1 { color: #483d8b; text-align: center; }
    .gallery {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
    }
    .gallery figure {
      margin: 0 auto;
      width: 90%;            /* 占视口宽度的90% */
      max-width: 600px;      /* 限制最大宽度 */
      text-align: center;
    }
    .gallery img {
      border: 1px solid #ccc;
      width: 100%;           /* 宽度铺满 figure 容器 */
      height: auto;          /* 保持纵横比 */
      display: block;
    }
    .gallery figcaption {
      margin-top: 5px;
      font-style: italic;
      color: #666;
    }
    a.back-link {
      display: block;
      text-align: center;
      margin-top: 30px;
      color: #483d8b;
      text-decoration: none;
    }
    a.back-link:hover { text-decoration: underline; }
  </style>
</head>
<body>
  <h1>Gallery</h1>
  <div class="gallery">

    
    <figure>
      <img src="gallery/first_day_if.jpg" alt="IF">
      <figcaption>My first day at IF (2022)</figcaption>
    </figure>
    <!-- 根据需要添加更多图片 -->
  </div>

  <p><a href="index.html">← Back to Home</a></p>
</body>
</html>
